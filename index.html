<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="initial-scale=1.0">
    <title>Tiago Maia</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/@govbr-ds/core@3.7.0/dist/core.css">
    <script src="https://unpkg.com/@govbr-ds/webcomponents@1.21.3/dist/webcomponents.umd.min.js"></script>
    <script src="https://unpkg.com/@govbr-ds/core@3.7.0/dist/core.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Tiago Maia</h1>
            <ul class="personal-links">
                <li><a class="br-button primary middle" href="https://www.linkedin.com/in/tiagomaia/">
                        <i class="fab fa-linkedin mr-1" aria-hidden="true"></i>LinkedIn</a>
                </li>
                <!--<li><a class="br-button primary middle" href="https://tiagomvf.github.io/">
                    <i class="fab fa-github-alt mr-1" aria-hidden="true"></i>GitHub Pages</a>
                </li>-->
                    <li><a class="br-button primary middle" href="https://github.com/tiagomvf">
                        <i class="fab fa-github mr-1" aria-hidden="true"></i>GitHub</a>
                    </li>
            </ul>
        </header>
        
        <main>
            <govbr-card>
                <div slot="header">
                    <h2>🏆 Professional Certifications</h2>
                    <p class="subtitle">Kubernetes and cloud-native expertise</p>
                </div>
                <div slot="content">
                    <div class="certifications-grid">
                        <div class="certification-item">
                            <h3>Certified Kubernetes Application Developer (CKAD)</h3>
                            <div class="badge-container">
                                <div data-iframe-width="150" data-iframe-height="270" 
                                     data-share-badge-id="3f1e4d16-ae43-41b4-aa9b-d7de4912a922" 
                                     data-share-badge-host="https://www.credly.com"></div>
                            </div>
                        </div>
                        <div class="certification-item">
                            <h3>Certified Kubernetes Administrator (CKA)</h3>
                            <div class="badge-container">
                                <div data-iframe-width="150" data-iframe-height="270" 
                                     data-share-badge-id="0b3866c5-63c0-4c27-96a4-8d914f10264c" 
                                     data-share-badge-host="https://www.credly.com"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </govbr-card>
        </main>
        <footer>
            <p>Personal portfolio • Kubernetes and cloud-native expertise</p>
            <p class="small">Page updated on <span id="date"></span>.</p>
        </footer>
    </div>
    <script>
        document.getElementById('date').textContent = new Date().toLocaleDateString('en-US', {
            year: 'numeric', month: 'long', day: 'numeric'
        });
    </script>
    <script type="text/javascript" async src="//cdn.credly.com/assets/utilities/embed.js"></script>
</body>
</html>
